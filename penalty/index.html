<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Mini Games — Penalty</title>

  <!-- shared theme + shared wallet -->
  <link rel="stylesheet" href="../home.css">
  <script src="../shared/wallet.js"></script>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg"></div>

  <div class="app">
    <header class="topbar">
      <div class="topbar__left">
        <div class="title">Mini Games</div>
        <div class="subtitle">Penalty</div>
      </div>

      <div class="topbar__right">
        <button id="soundBtn" class="pill" type="button" aria-label="Звук">
          <span id="soundDot" class="dot"></span>
          <span id="soundTxt">Звук on</span>
        </button>

        <button id="bonusBtn" class="pill pill--bonus" type="button">+1000</button>

        <div class="pill pill--balance">Баланс: <b id="bal">1000</b> ₽</div>
      </div>
    </header>

    <main class="card">
      <div class="head">
        <div class="h1">Пенальти</div>
        <div class="hint" id="diffHint">Лёгкий: вратарь угадывает реже.</div>
      </div>

      <div class="layout">
        <!-- LEFT: Goal -->
        <section class="left">
          <div class="goalWrap">
            <div class="goalTitle">
              <div class="mini">Выбери зону удара</div>
              <div class="miniRight">
                Шаг: <b id="stepMini">0</b> · <span id="xMini">x1.00</span>
              </div>
            </div>

            <div id="goalFrame" class="goalFrame">
              <div class="goalNet"></div>

              <div id="zones" class="zones" aria-label="goal zones"></div>

              <!-- gloves group -->
              <div id="gloves" class="gloves" aria-label="goalie gloves">
                <div class="glove g1"></div>
                <div class="glove g2"></div>
              </div>

              <!-- ball -->
              <div id="ball" class="ball" aria-label="ball"></div>
            </div>

            <div id="msg" class="msg">Выбери ставку и сложность, затем нажми «Ставка».</div>
          </div>
        </section>

        <!-- RIGHT: Controls -->
        <aside class="right">
          <div class="panel">
            <div class="row">
              <div class="lab">Сложность</div>
              <div class="val"><b id="diffLabel">Лёгкий</b></div>
            </div>

            <div class="diffRow">
              <button id="easyBtn" class="seg active" type="button">Лёгкий</button>
              <button id="hardBtn" class="seg" type="button">Сложный</button>
            </div>

            <div class="hr"></div>

            <div class="row">
              <div class="lab">Ставка</div>
              <div class="val"><b id="betLabel">100</b> ₽</div>
            </div>

            <div class="betRow">
              <button id="minus" class="btnSmall" type="button">−</button>
              <input id="bet" class="betInput" type="number" min="1" step="1" value="100" />
              <button id="plus" class="btnSmall" type="button">+</button>
            </div>

            <div class="chips">
              <button class="chip" data-chip="10" type="button">10</button>
              <button class="chip" data-chip="50" type="button">50</button>
              <button class="chip" data-chip="100" type="button">100</button>
              <button class="chip" data-chip="250" type="button">250</button>
              <button class="chip" data-chip="500" type="button">500</button>
              <button class="chip" data-chip="max" type="button">MAX</button>
            </div>

            <div class="hr"></div>

            <div class="stats">
              <div class="s">
                <div class="lab">Шаг</div>
                <div class="val"><b id="stepTxt">0</b></div>
              </div>
              <div class="s">
                <div class="lab">X</div>
                <div class="val"><b id="xTxt">x1.00</b></div>
              </div>
              <div class="s">
                <div class="lab">Забрать</div>
                <div class="val"><b id="cashLabel">—</b></div>
              </div>
            </div>

            <div class="actions">
              <button id="placeBtn" class="btnPrimary" type="button">Ставка</button>
              <button id="cashBtn" class="btnGhost" type="button">Забрать</button>
              <button id="resetBtn" class="btnGhost2" type="button">Сброс</button>
            </div>
          </div>

          <div class="ladderWrap">
            <div class="ladderHead">
              <div class="h2">Лестница X</div>
              <div class="muted">Активный шаг подсвечен</div>
            </div>
            <div id="ladder" class="ladder"></div>
            <div class="tiny">Монеты виртуальные. Вывода нет.</div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
